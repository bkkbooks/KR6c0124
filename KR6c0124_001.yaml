body:
  text: 大樂經顯義抄卷上此書頗可祕之大概者是據理趣釋深意消釋義旨也但科段章句者依真實經文句意也凡義勢引用顯密諸教也大樂金剛不空真實三昧耶經般若波羅蜜多理趣品者將釋此經今略以三門分別一者明教起因二者釋經題目三者釋本文也初明教起因者是有二一者總明真言法教之起因二者別明是經之起因也初總明真言法教起因者是且凡於諸教略有二種一者顯教二者密教也謂顯密二教差別者二教論云應化開説名曰顯教言顯略逗機法佛談話謂之密藏言祕奧實説顯教契經部有百億分藏則有一十五十一之差言乘則有一二三四五之別談行六度為宗告成三大為限是則大聖分明説其所由若據祕藏金剛頂經説如是變化身為地前菩薩及二乘凡夫等説三乘教法他受用身為地上菩薩説顯一乘等並是顯教也自受用佛自受法樂故與自眷屬各説三密門謂之密教也此三密門者所謂如來內證智境界等覺十地不能入室何況二乘凡夫誰得升堂云云且約説密教亦有二種因義所謂一者自受法樂故説法二者攝化衆生故説法也且自受法樂故説法者祕藏寶鑰云極無自性以外七教皆是他受用應化佛所説真言密教兩部祕藏是法身大毗盧遮那如來與自眷屬四種法身住金剛法界宮及真言宮殿等自受法樂故所演説十八會指歸等其文分明云云又瑜祇經云一時薄伽梵金剛界遍照如來以五智所成四種法身於本有金剛界自在大三昧耶自覺本初大菩提心普賢滿月不壞金剛光明心殿中與自性所成眷屬金剛手等十六大菩薩及四攝行天女使金剛內外八供養金剛天女使各各以本誓加持自住金剛月輪持本三摩地標幟皆以微細法身祕密心地超過十地身語心金剛各於五智光明峯杵出現五億俱胝微細金剛遍滿虛空法界諸地菩薩無有能見俱不覺知熾然光明自在威力云云又是經説常恆三世一切時身口意業金剛大毗盧遮那如來在欲界他化自在天王宮中一切如來常所遊處乃至大菩薩衆恭敬圍繞而為説法者即是義也大日經云毗盧遮那如來加持故奮迅示現身無盡莊嚴藏如是奮迅示現語意平等無盡莊嚴藏非從毗盧遮那佛身或語或意生一切處起滅邊際不可得而毗盧遮那一切身業一切語業一切意業一切處一切時於有情界宣説真言道句法文二者攝化利生故説法者大日經云又現執金剛普賢蓮華手菩薩等像貌普於十方宣説真言道清淨句法所謂初發心乃至十地次第此生滿足緣業生增長有情類業壽種除復有芽種生起云云一行阿闍梨釋云若如來但住自證之法則不能度人何以此處微妙寂靜絶出過心量説何示人耶又云復以加持神力普現身口意遍滿生死中當知此則是方便也若離方便如來本地尚不可説何況以示人耶不可為諸上首等菩薩説何況流入生死中耶以此方便同於大空而現衆像當知一切大會曼荼羅皆是一身無別身也即是普門身也即是法界身即是金剛界身也云云又瑜祇經云常於三世不壞化身利樂有情無時暫息以金剛自性光明遍照清淨不染種種業用方便加持救度有情演金剛乘唯一金剛能斷煩惱以此甚深祕密心地普賢自性常住法身攝諸菩薩唯此佛剎盡以金剛自性清淨所成密嚴華嚴云云已上述為自行化他通説密教義也二者別明説此經起因者理趣釋曰經云説一切法清淨句門者為修瑜伽行者於生死流轉不染故廣作利樂有情事故速證無量三摩地解脫智惠故速集廣大福德資糧故超越一切魔羅毗那夜迦衆速疾得世出世間勝願滿足故説如來大悲愍念最上乘種性者説十七種清淨瑜伽三摩地已上依五因説是經也又云毗盧舍那佛在大衆中為未來有情修瑜伽者對諸十地菩薩説受持讀誦具修行福利速滅無始時來無量諸重業障乃至未來際以悲愍廣大願力周遊六趣利樂有情由聞及修不染不受諸不善異熟業獲得世出世間殊勝悉地即於十六生作金剛薩埵菩薩等乃至金剛拳最後身便成毗盧遮那身也云云又義述云昔毗盧遮那如來於他化自在天王宮為諸大菩薩等説此般若波羅蜜多甚深理趣十七清淨句門蓋是十七大菩薩三摩地之句義也為令住持者疾至菩提故遂演此十七聖位大曼荼羅如來與諸大士等所説密語依此修行速疾成就文已上別明此經起用也第二釋題目是亦有通別兩目先明別號者大樂金剛不空真實三摩耶經者是也是名即獨齊最初金剛薩埵章及第十七章之名故是名則當別號也後明通號者依十住心論説者於此真實經約通號而正立金剛頂經號文而是號是通別兩名中是當通號也謂以大本金剛頂經十萬偈之中有是真實經是真實經即彼十萬偈經中其一品故以本經通號而為別品之總名義而已具可云金剛頂瑜伽大樂金剛不空真實三摩耶經也金剛如下釋頂者最尊最上義也瑜伽者此云相應也三密相應三摩地行是也次此十七章通皆名為般若理趣品也謂於十七章悉皆該説般若理趣義故名為般若波羅蜜多理趣品號也且就初別號大樂金剛不空真實三摩耶者若約五部釋之者如次配佛部金剛部寶部蓮華部羯磨部也五部即是通五智義也如次配法界智大圓鏡智平等性智妙觀察智成所作智也大師理趣般若經略釋云第二釋題目者大樂金剛不空真實三摩耶經般若波羅蜜多理趣品謂大樂者大日如來金剛者阿閦如來不空者寶生如來真實者無量壽如來三摩耶者不空成就如來經者佛法之海名也般若波羅蜜多者字本不生之義也理趣者從初字至于終字其中甚深奧藏也品者五智溟海受諸尊萬流故名曰品也文又三昧耶光法師所述大觀自在四十手深要決義記云大樂者佛部金剛者金剛部不空者寶部真實者蓮華部三昧耶者羯磨部也菩提留支所譯實相般若經題即立大安樂金剛法性實相般若名也文私云大樂名為佛部義是佛果以智惠樂令其遊戲為樂德故也故法華經云與無量無邊佛智惠樂令其遊戲云云又密嚴經云諸聖現法樂見真無漏界自覺聖智境清淨最無比云云又涅槃經二十三云三者一切知故為大樂非一切知不名為樂説佛如來一切知故名為大樂以大樂故名大涅槃身不壞故名為大樂身若可壞則不名樂如來之身金剛無壞非煩惱身無常之身故名大樂以大樂故名大涅槃文又金剛者是真如之智自體堅固不可壞義也故祕藏記云金不壞義智也又四種曼荼羅義云金剛部者智摧破義如金剛杵等摧破物智亦能摧破煩惱等云云不空者是表寶部義也意云三摩尼寶珠是一切黃石中而無摩尼珠也如黃石必定在摩尼珠不虛妄也彼一切衆生心識中必定有佛性如來藏實而無虛妄云也故釋摩訶衍論第七云此真如法其性平等遍凡聖中似彼珠故言於彼石中有此寶故其石色黃者當喻何法喻諸衆生悉有本覺有心相故所以者何一切衆生故有了別識似彼石故云云又解生死世間是皆虛妄法也三寶出世間境界悉不虛妄云也故涅槃經二十七云空者即是出死不空者謂大涅槃云云真實者是蓮華部義也問何故蓮華名云真實義耶答若約譬言之者蓮華生果必定不虛謬也餘華不定也或有生果不生果華也故吉藏法師法華玄論云明此花必生於果餘華不爾或生或不生喻一乘之因必當作佛三乘之因或作或不作云云若約法明之者菩提心論云凡人心如合蓮華乃至如是真實心故佛所宣説云云又蓮華三昧經云歸命本覺心法身常住妙法心蓮臺云云又大日經第二云內心大蓮華八葉及鬚蕊於四方葉中四伴侶菩薩等云云又祕藏記云蓮華即理也理處亦有智云云又四種曼荼羅義云如蓮華不染理亦不染故理蓮華形也云云三昧耶者是平等義也即是平等理佛性是也又利樂衆生之平等業用也祕藏記云三昧耶有多義且表四義一平等義二誓願義三驚覺義四除垢障義也佛知衆生身中本來自性理與佛等無差別而衆生不知已本始兩覺與佛等恆常覆蔽六塵煩惱不能顯出是故佛發悲願我拔衆生如我無異乘斯誓願若衆生有歸依者住法界定自受法樂如來驚覺不敢違越本願影向行者所以真言印契加持護念譬如國王自造法令不敢違犯令他行之衆生蒙佛加持力突破六塵遊埿出現自心覺理如賴春雷響蟄蟲出地知與佛等無差別是平等義如我無異是誓願義也如來驚覺是驚覺義衆生蒙佛加持力得益是除障義云云又云為衆生垂悲愍成辨一切事業云羯磨部云云問金剛薩埵是阿閦佛所屬菩薩金剛部所攝也而何具足五部義耶答若是為阿閦佛所攝時為金剛部也但今日者以金剛薩埵直為中台而次四菩薩為四親近眷屬時以法界體性智配中台金剛薩埵尊以四智如次配四菩薩也故可知經題目立五部義蓋是意也問以何文證知是義答大師説云四方四佛各具四智東方阿閦佛為主則是法界智自餘四菩薩是四智也餘亦準此可知者即非是意耶又彼四親近菩薩等豈異人乎即中台金剛薩埵之內證智用差別分身耳故此五尊曼荼羅者於一體之月輪中五尊同坐此義耳具義如五祕密儀軌辨説也大者是悉廣大貫通是五部諸法義也高野大師説云大有三義謂大多勝義也一竪橫無邊際故云大二數量過塵剎故云多三是最勝上故云勝云云私云此三摩地門中所説教理行果是有十佛剎微塵數量之淺深差別不同義故云竪無邊際故謂大也又如是塵數法門皆橫一相一味法爾所成義故云橫無邊際故亦云大也又如是智門中人法無數量無邊際故云數量過塵剎故即云多義也又此金剛乘法過勝顯教所説一乘三乘等義故云最上故云勝也又云此中所謂大者人中之大法中之大教中之大體中之大相中之大用中之大乘中之大因中之大行中之大果中之大入中之大理中之大智中之大定中之大如此具十佛剎塵數大此大則絶待常住不二之大不是相待無常之大云經者又大師釋云經者貫串不散之義以語密為經以心密為緯織三業之絲為海會之錦錦文千殊云云又私以大樂金剛不空真實三摩耶名若配釋三點四德者大樂者是解脫點是解脫業煩惱苦三道也不解脫此三道是非真實樂故不名火樂也問二乘人入無餘涅槃解脫諸苦何不名大樂耶答彼分解脫分段生死之三道未解脫變易中三道故不名大樂也今真言乘佛全解脫二種生死三道故名大樂也亦二乘無餘涅槃身智灰滅有何樂義耶真言乘法佛身智常住不滅所以名大樂也金剛者是般若點是能斷智也不空真實者是法身點是色身智身皆法身義也是配逆次也三昧耶者是三默一體平等不二大般涅槃是也約是三點身業是法身點語業是解脫點意業是般若點也是配三密法如次佛部蓮華部金剛部義也若約四德釋之者大樂者是直樂德也樂受恆常不變易自性安穩無沮壞為義也金剛者是常德也以不沮壞不變易之堅固體用為常義也有沮壞物即為無常故也不空者是淨德也謂三界有漏心心所等諸法皆是虛妄分別相而自性不淨也翻對彼染故此法佛無漏法不虛妄顛倒而自性清淨故云不空也唯識論七云虛妄分別有於此二都無此中唯有空相彼亦有此此頌且依染分依他説云云此義意云有為有漏不淨法皆從妄想顛倒生起而無實體云也法佛境界不爾故云不空也真實者是我德也不空者明離失義也真實者顯具德義也以虛假無實法不為真我故也以自在常一實德為真我故也三摩耶者是平等義也謂表示如是四德是一體平等義也一德之上必自然具足餘三德故也平等平等衆德周備故云三昧耶也又解大樂金剛者能證智慧也不空真實者所證理境也所謂如如智如如理是也三摩耶者顯示理智平等無二無別義也謂智即理理即智是境智無二義也不空者離失義真實者顯德義也謂離虛妄失而具真實德云也般若者是能觀之智品也即上所明五智品之菩提心是也波羅蜜多者前五智菩提之運載菩提涅槃之彼岸業用是也理趣者所觀之實相真如深妙理性是也若具釋之者般若者此云智慧具應云般若那也良賁仁王經疏云大品以若一字通名智慧以般助若若名惠以那助若若名為智般若云惠闍那云智而亦惠處説智智處説惠云云波羅蜜多者此云到彼岸也是所作已辨義也始覺成滿義也是即通自行化他也理趣者理是真實道理也即是所詮之法體也趣者於此所詮法體所備之義趣是也若指事明者妙適等十七位是法體也此法體之上所備清淨等用者是義趣也義者是法之所以也又理趣者是宗趣義謂以三密內證境界體為宗也於此三密法境以有信行得果之用為趣云也謂以正理為所宗體也是三密之境界是極正理也令趣入是正理之用名為趣也趣是作用也進趣義也第三釋本文者文句云就此經中開為三段謂初之七事為緣起分次十七章為正説分後一頌為流通分就初序中然今是經唯有通序而無別序通序中則有七事具如下列也是依大記也云云經如是者第一總舉所聞之法體所謂指下所列十七章會之法也經我聞者第二別明聞能持之人也謂高野大師作三番釋謂若有三釋初金剛薩埵之詞也次親之指言三法爾有無人增減初金剛薩埵之詞者金剛薩埵釋云傳聞豈工言我金剛薩埵親從大日尊聞也復次廣眼尊親指説言如是我見聞覺知云云經一時者第三明同持和合而非異時云云若祕釋意云大日經疏云越三時如來之日加持如世間時分有過去未來現在長短劫量種種不同且約日行四天下一周晝夜各有初中後乃至三十時等剎那不住代謝相推以淨眼觀之三際之相了不可得無終無始亦無去來即此寶相之日圓明常住湛若虛空無有時分修短之異文經薄伽梵者第四明能聞持之所從人也謂能説教主是也第一先標尊號也薄伽梵者無正翻也義翻當世尊義也大疏有四義釋薄伽梵義也一者佛地論師義有六義一自在二熾盛三端嚴四名稱五吉祥六尊貴云云第二能破義譬如有人以持利物摧切怨敵等名云能破者也是名梵云婆伽婆也如此佛破滅諸惑障義亦亦名為婆伽婆云也第三能除能生義謂能斷惑障而生智德也第四福德具足義也以四義總名薄伽梵也經成就殊勝一切如來金剛加持三摩耶智已得一切如來潅頂寶冠為三界主已證一切如來一切智智瑜伽自在能作一切如來一切印平等種種事業於無盡無餘一切衆生界一切意願作業皆悉圓滿常恆三世一切時身語意業金剛者若依文句釋者從此已下第二約五智歎勝德也文經大毗盧遮那如來者第三舉説主尊號也文有五句也就此文中經成就殊勝一切如來金剛加持三摩耶智者歎大圓鏡智德也是成就殊勝者是句廣貫通五智諸句也凡修得五智名云成就也佛地中雖衆德無數而以五智為上首而攝餘一切功德法也是五智是佛地之不具德故云殊勝也此中加持者示自他平等攝入攝持加持義也謂自佛他佛之智力色身皆悉互相涉攝入而無別異隔界也三摩耶者是平等義也祕藏記云金剛不壞義智也加持界會諸尊攝入攝持義也三昧界會諸尊彼此平等義云云經已得一切如來潅頂寶冠為三界主者第二歎平等性智也經已證一切如來乃至瑜伽自在者第三歎妙觀察智也經能作一切乃至皆悉圓滿者第四歎成所作智也經常恆三世乃至意業金剛者是明法界體性智也常者自性常義也是遠離剎那生滅之有為相也恆者是遠離一期生滅之無常相也又解常者自本遠離初生起時無常咎也恆者遠離終盡無常咎也凡遠離去來今三世代謝無常相而凝然常住身口意業法然所成無初無終身口意如金剛沮壞性即名為法界體性智云也如密嚴經云密嚴中之人一切同佛相超過剎那壞常遊三摩地又云如來清淨藏亦名無垢智常住無始終離四句言説云云更就第四歎成所作智句中經能作一切乃至種種事業者明成事智自行之德成辨用也經於無盡無餘乃至皆悉圓滿者明化他滿足德也已上歎五智德也釋名如菩提心論私記明也經大毗盧遮那如來者第六舉尊號而屬前五智德也大日尊成就此五智也而分四智用如次配四佛也經在於欲界他化自在天王宮中一切如來常所遊處吉祥稱歎大摩尼殿種種間錯鈴鐸繒幡微風搖擊殊鬘瓔珞半滿月等而為莊嚴者第五明説經處之美中是即明聞持處也就中為三先正明方處經在於欲界主天王宮中者是也次明所居處愛樂相經一切如來至大摩尼殿者是後明處莊嚴經一切如來至半滿月等者是也後就明莊嚴中更有三先總標經種種間錯者是也次別列也經鈴鐸繒至半滿月等是也後一句為總結也問何故於此第六天上説此經耶答理趣釋云他化自在天宮者名為欲界頂他化自在天王宮殿菩薩證得第六地位現前地菩薩住般若波羅蜜觀多作此天衆生為天人説般若波羅蜜其天界五欲殊勝超越諸天是故毗盧遮那佛為金剛薩埵説大樂大貧染加持現證瑜伽理趣速疾由是得聞不染世間雜染諸煩惱超越摩羅之境云云問此他化自在天宮者是世間他化自在天宮殿歟為當法佛法爾所成宮殿歟答不謂是唯世間有漏業煩惱所成宮殿也即法爾所成宮殿也故理趣釋云其宮殿是大樂不空金剛薩埵大曼荼羅皆從毗盧舍那佛福德資糧出生大妙金剛五寶所成金剛峯寶樓閣其曼荼羅四方八柱列四位四門中位毗盧舍那遍照如來內證之智解脫是也云云此理趣釋是述淺略深祕二釋也此淺略深祕二種他化自在天宮者猶靈鷲山有淨穢二土也穢土為壞劫被壞淨土為壞劫不被壞也故法華云常在靈鷲山及餘諸住處衆生見劫盡我此土安穩等云云此天宮亦爾也就所居處愛樂相中淺略義如上所釋也欲界第六他化自在天是欲界中殊勝妙樂處也以是義表金剛薩埵內證大樂大貧染極妙樂義也大摩尼殿者理實應言廣大摩尼殿謂於法界宮中有五種三昧耶種子字而便顯成大宮殿所謂鑁吽怛洛紇利惡五字也是五字顯成周遍法界宮殿故名為大殿也大者大疏第一云廣大金剛法界宮者大謂無邊際故廣謂不可數量故云云又第十八云長謂人所不及也私謂此即云何也其廣橫遍於一切衆生界其長云何竪窮佛界故云廣長也云云今私云是廣長義總只云大也摩尼者仁和上解云即譯為珠或云摩尼者如意神珠也大興善寺三藏陀羅尼釋云摩尼梵音是云寶寶義有六一者難得故二者淨無垢故三者有大威德故四者莊嚴故五者殊勝無比故六者不變易故無量寶珠萬億妙寶綺飾莊嚴故摩尼收攝法界故名殿即顯如來內證五智其殿四方正等具足四門左右有吉祥幢軒楯周環四重階道於其殿上有五樓閣懸雜繒綵珠網華鬘交緒莊飾乃至若就經文祕釋者三十七智妙用交接故云種種間錯也鈴鐸驚發昏情是慈悲義繒翻流動去來是表智用若有機發感應道交故云微風機必應故云微風搖擊應衆機以五智珠鬘三密瓔珞故珠鬘等衆生性欲淺深不同如來赴應漸頓亦異或以三乘顯教或以頓證祕教故云半滿月等非但一世利生遍三世益物是故云等皆是如來二利之德也故云而為莊嚴也文今私云等者是等取餘種種無盡莊嚴也經與八十俱胝菩薩衆俱所謂金剛手菩薩觀自在菩薩虛空藏菩薩金剛拳菩薩文殊師利菩薩才發心轉法輪菩薩虛空庫菩薩摧一切魔菩薩與如是等大菩薩衆恭敬圍繞而為説法第六明同聞衆中為三先舉數標類經與八十俱胝菩薩衆俱者是也次列名所謂金剛手至金剛拳菩薩摩訶薩者是也後總結威儀也就此列名中則有八大菩薩即是如次依大日如來月輪震兌離欠巽坤乾艮之八方而待衛之問如智度論云法性身佛説法會聽法衆遍滿虛空界云云而是經是法身如來説法者何同聞衆頗減少耶答是中八十億者是且可舉大數也八者是標八方八位也十者是顯圓數也俱胝者此云億也億有四位一十萬云億二百萬云億三千萬云億四萬萬云億也但千萬云億是俱胝億也常途事也具如仁王經儀軌中辨而是億中是攝取恆沙塵數衆無失也如瑜祇經云於五智光明峯杵出五億俱胝微細金剛云云是中五億俱胝者總數也微細者是別數也佛剎塵數等是也今八十俱胝者此文下必可有佛剎微塵等數也而略不舉之也或隱而不舉也此守護經九云四佛各四菩薩四菩薩各有一俱胝那由他以為眷屬云云又禮懺經云一切如來適悅心金剛嬉戲等盡虛空遍法界一切供養雲海菩薩等云云是其類也經初中後善文義巧妙純一圓滿清淨潔白以下歎所説教勝德也就中則有七善一初中後善若約行明之者三業三密義又三學等皆善巧也又依此所説有發菩提心修菩薩行證菩提果三種善巧故名云初中後善也若約教明之者序分正宗流通俱皆善巧也又解初善者第一金剛薩埵章是也中善者從第二章至第十六章是也後善者第十七章是也二文巧三義巧也謂能詮所詮俱巧妙也能詮之文句巧妙而無鄙拙錯亂也所詮義契道理而甚深微妙也四純一謂是即明純大乘義唯一金剛乘義也不明二乘三乘之雜行法也五圓滿謂明自行化他圓滿福智圓滿斷證圓滿故義圓滿理事圓滿等義也六清淨謂所説教行理果極能斷染汚而終成就無漏清淨法也是始覺淨也七潔白謂明本覺本來不染清淨義也本釋示也但今私云若例他經者是七善是恐當別序義若例法華等者即是別序意相當也已上序分畢也經説一切法清淨句門者從下是第二明正説分也就中為二初別明理趣體相後總明理趣功能也就初別明理趣體相中自有一十七章一大樂不空初集會品二毗盧舍理趣會品三降三世品四親自在菩薩理趣會品五虛空藏品六金剛拳理趣品七文殊師利理趣品八才發意菩薩理趣品九虛空庫菩薩理趣品十摧一切魔菩薩理趣品十一降三世教令輪品十二外金剛會品十三七母天集會品十四三兄弟集會品十五四姊妹集會品十六四波羅蜜部大曼荼羅章十七五種祕密三摩地章也今就初金剛薩埵章中文分為二初正明大樂不空金剛薩埵般若理趣次重明大樂金剛不空三昧耶本誓心真言初中為三初總標章次釋義後歎德自下十六章準之應知也説一切法清淨句門者是初總標章也謂宣説無漏無為之法遠離惑染障而成就究竟最勝清淨果德義也次第二釋義者經所謂妙適至般若波羅蜜多清淨者是釋義也就中有二初真釋義後舉所因而釋義也就即其初直釋義中經妙適清淨句是菩薩位者是初明大樂金剛普賢延命金剛薩埵位之句義也是妙適清淨句是菩薩位者妙適之句義當是十六大菩薩中之最初大樂金剛薩位之位云也餘經教中所言等覺如來妙覺菩薩者即當此人等也句者是迹義也逗義也又顯彰義也意云句是能顯義也義是所顯之所以也譬如依象之足迹而尋得象自體也依能詮文句而顯得所詮義趣也此亦爾也大疏云句者梵云鉢曇正翻為足聲論是進行義住處義如人進步舉足下足其迹所住處謂之鉢曇言辭句逗義亦如是故同一句耳今就此宗謂修如是道迹次第進得住三平等處故名為句云云經欲箭清淨句至一切法自在主清淨句是菩薩位者是四種之名句如次明金剛薩埵菩薩之伴之四親近菩薩位也經見清淨句是菩薩位至慢清淨句是菩薩位者是四種名句如次明內四供養菩薩位也經莊嚴清淨句至身樂清淨句是菩薩位者是四種名句如次明四供養位也經色清淨句至味清淨句是菩薩位者是四種名句如次明四攝菩薩位也妙適者本釋云妙適者即梵音蘇囉多也蘇囉多者如世間那羅那哩娛樂金剛薩埵亦是蘇羅多以無緣大悲遍緣無盡衆生願得安樂利益心曾無休息自他平等無二故名蘇羅多耳由修金剛薩埵瑜伽三摩地得妙適清淨句是故獲得普賢菩薩位云云問世間那羅那哩者表何義耶答未見其正翻也但撿一卷梵語集云少兒娜引羅迦女子娜哩迦文私云以義推之者當夫婦二根交合而身心得悅樂遂以懷妊子息而於産生子息即其成慈愛時而無暫休息義之喻是也此義如理趣釋云以自金剛與彼蓮華二體和合成為定惠是故瑜伽廣品中密意説二根交會五塵成大佛事文是即密喻也蘇羅多者大疏第十七云梵音名蘇羅多是著義也著微妙之法故也復次蘇羅多者是共住安樂義謂共妙理而住相受於現法之樂也等文又云是遍欲求義云云此欲求義者如大疏第一云復次帝釋聲明論謂女人為薄伽是欲求因緣能息煩惱義云云是即取喻意也義述云其一所謂大安樂不空三摩真實金剛菩薩蓋表諸佛普賢之身周遍器世間及有情世間以其無邊自在理體常寂不忘不壞故有是名左持金剛鈴是適悅義置腰之左表大我義焉右持五鈷金剛是五智義轉拳向外示衆生也於曼荼羅據有中位而總其衆相除是而有一十六位焉蓋正覺之經疏云云金剛手者本釋云金剛手菩薩摩訶薩者此菩薩本是普賢從毗盧遮那佛二手掌親受五智金剛杵即與潅頂名之為金剛手菩薩云云又云左手作金剛鬘印者為降伏左行有情令歸順道右手抽擲五智金剛杵作勇進勢者令自他甚深三摩地順佛道念念升進獲得普賢菩薩之地云云次欲箭清淨句至愛縛清淨句是菩薩位者是中方金剛薩埵菩薩之四親近眷屬之中第一菩薩者義述云其二所謂意生金剛以大悲欲箭害二乘心所以手持是箭而現其欲離俱幻平等智身云云問中央金剛薩埵妙適義與所從菩薩中欲箭義有何異耶答妙適是直自受法樂義也大悲欲箭是欲利他之欲貪心也又初妙覺位後等覺地也所以異也觸清淨句者義述云其所謂髻利吉羅金剛菩薩於中國之言名觸以不捨衆生必令解脫故明觸性菩薩故私云無漏觸之名也所以住抱持相而其觸淨俱幻平等智身云云愛縛清淨句者義述云其四所謂悲愍金剛菩薩以悲愍故愛念繩普縛衆生未至菩提終不放捨亦如摩竭大魚吞噉所遇一入口已更無免者所以持此摩竭魚憧而現其愛縛捨離俱幻平等智身云云一切自在主清淨句者義述云其五所謂金剛慢菩薩以無上智令一切衆生悉證毗盧遮那如來體於世出世間皆得自在所以住傲誕威儀而現其我無我俱幻平等智身云云是四親近菩薩如次金剛薩埵菩薩前右後左住也已上四親近位辨了如理趣釋文者弱吽鑁斛如次配外四供養也又儀軌文所云普賢十七字真言與理趣釋所辨十七字文及教時義第一所引十七字文一一相違可悉之經從見清淨句至慢清淨句者次明內四供養菩薩也義述云其六所謂金剛見菩薩以寂照大惠之眼於雜染界妙淨土乃至真諦俗諦唯見一切法勝義真實之諦不散不動所以持意生之契而現其三昧之身云云適悅清淨句者義述云其七所謂金剛適悅菩薩於身塵而得適悅清淨於生死解脫不厭不住所以持觸金剛相而現其三昧身云云問第一妙適與此適悅有何差別耶答前約心智立名義也此適悅者唯約身分立名義也愛清淨句者述云其所謂金剛貪菩薩即貪愛而得清淨故遂能以貪而積集功德智惠疾至菩提由住貪愛性故所以持悲愍之契而現其三昧之身云云鬘清淨句者述云其九所謂金剛自在菩薩出入三界自在無畏於生死涅槃而謂大我之體所以住金剛慢相而現其三昧之身云云問前一切自在主與是鬘有何差別耶答前利他行也是自利德也此四內供養菩薩如次金剛薩埵右邊前後隅左邊後前隅住也已上內四供養了莊嚴句者述云其十所謂金剛拳菩薩能以菩提覺華起供養雲海亦以方便授與衆生作功德利以花是眷事遂以名之故持花以為其契云云意滋澤清淨句者述云其十一所謂金剛雲菩薩能以法澤慈雲滋潤含識亦以方便授諸身心便無始無明臭穢不善化成無量供養香雲以爐煙象雲遂以為號故持焚香之器以為契焉云云問既春秋冬三季而為如次配花燈塗三菩薩名也而何以夏義而不配香菩薩名耶答於本釋中雖無此釋今私云是意滋澤句是當夏季義也其所以者西方有三時所謂寒熱雨降三時也熱發時有十二月及正二三之四個月時也雨降多有夏時也謂從四月十六日至于八月十五日雨降也是時重雲普布雨林雨盛降故以雲金剛為夏義也意滋澤之雲義即當夏時耳故大疏第二云第五十二云何雲心謂常作降雨思念者如西方夏三月中霖雨特甚以常滯淫昏熱故時俗愛樂思慮之心蔚翳滋多故云作降雨思念也云云光明句者述云其十二所謂金剛秋菩薩常以智燈破諸黑暗亦以方便授與衆生起無量光明供養雲海以其空色清爽映如秋時表智光體遂名之故執燈明以為其契云云身樂清淨句者述云其十三所謂金剛霜雪菩薩能以五無漏香塗衆生心體滅煩惱之契成五分法身之香亦以方便授與衆生起塗香供養雲海以栴檀塗香解脫諸熱毒有似霜雪遂以名之執塗香以為其契云云已上外四供菩薩也色清淨句者述云其十四所謂金剛色菩薩以色清淨智於淨妙界起受用色身於雜染世界起變化色身而為攝成之事故持鉤為契云云聲清淨句者述云其十五所謂金剛聲菩薩以清淨智能表六十種梵音普周法界而為引入之事故持索以為契云云香清淨句者述其十六所謂金剛香菩薩以香清淨智發金剛界自然名稱之香入一切心以為止留之事故持鎖為契云云味清淨句者述云其十七所謂金剛味菩薩以味清淨智持瑜伽三摩地無上法味以為歡樂之事故持鈴為契云云若依蓮華部儀軌説者以弱吽如次配四攝菩薩也而但理趣釋及文句等是若恐隱密意故以為外四供養菩薩而如次配春夏秋冬者為令迷法慢人故成互綺説歟吉可思也已上四攝菩薩了此十七尊是一部曼荼羅義用備成辨義耳是十七句義一一即是祕密教中佛菩薩之祕號也故二教論云如是文句一一文句一一文一一句皆如來密號也二乘凡夫但解句義不能解字義但解字相不得知字之密號覽之智人以顯句義莫傷祕意若見薩埵釋經此義可知之莫怪之云云經何以故一切法自性清淨故般若波羅蜜多清淨者釋義中第二舉所因而釋義即是也意是中所照所顯法是無漏清淨故能顯能照智惠亦即清淨云也是中一切法者非謂世間有為有漏生死所攝諸法自相自義也是但指法爾所成無為無漏三寶三密境界諸法而云一切法自性清淨故也問以何文知一切法者以無漏無為為一切法云耶答大疏九云梵音毗富羅是廣大義謂深廣無際不可測量如是諸法自體名為毗富羅法界諸佛實相真言實相衆生實相皆是毗富羅法界以此更相加持故名法界加持文私云一切法者與諸法者是相通同義意也又解一切者謂有為有漏世間一切法也自性清淨故者於有為有漏法而與其為自性物者即是正此無為無漏法是也三密境界也第二釋義章段訖經金剛手若有聞此獲得如來執金剛位者是第三明歎聞經修行德也就中有二義一者歎滅罪德二者歎生善德也經金剛手若有至消滅不難者是第一歎滅罪德文也經若能受持至如來執金剛位者第二歎生善德文也亦於是兩門中各有二文一者初先明行相後明功報也初明滅罪中行相者經若有聞此至般若理趣者是也次明滅罪中功報者經乃至菩提至消滅不難者是也第二就生善中先明修行相經若能受持至作意思惟者是明生善行相文也經即於現生至執金剛位者是明生善中功報文也就前滅罪功報中乃至菩提道場者謂初從聞此經法發菩提心畢是中聞經三賢十地終至于成佛果遂不墮三惡趣云也此中聞者是聞思也是品不謂取無惠之聞也位當十信行也地藏菩薩占察經般若燈三藏法師疏云二者內執我見垢心障所以不能勤觀自身無常苦空不淨無我雖復誦念不能決定仍不名為聞不名誦念但獲世報如經若雜亂垢心雖復稱誦我之名字不名為聞文今此中聞經義亦爾也問是不墮惡趣益者若是消滅感惡趣業煩惱已後而不墮歟為當業煩惱尚存而雖現行而不墮惡趣歟答消滅感惡趣業煩惱已而不墮惡趣是常途事也不希有事也今依聞經功雖有業煩惱等四障積集而不墮惡趣是為希有事云也故經文云設廣積集必不墮於地獄等趣者是也一切蓋障者是五蓋等障也是障即障礙感人天二趣善果及得入三乘菩提涅槃二果之障難法也五蓋者大乘義章五云言五蓋者一貪欲二瞋恚三睡眠四悼悔五疑於外五欲染愛名貪忿怒曰恚一切煩惱睡著境界不能堪忍名之為睡身心眠昧略緣境界説之為眠𮜒動名悼於所作事追變稱悔於法猶預説以為疑蓋有四義一是障義二是破壞義三是墮義四是臥義云云煩惱障者感招分段生死之見修一切煩惱也法障者障礙入三乘菩提等也是即出世道之惑障是也又法障者是所知障也不了知如實諸法自共相及自性空義故名云法障也業障者五逆十惡等感三惡八難果之業難是也問亦有如是四障不滅而不墮惡趣功無滅盡如是衆罪之功耶答經云設作重罪消滅不難者即有一時消滅無量衆罪勝用云也只大概是任行者意樂不同耳或菩薩故起惑障故留罪根而不受惡趣報而求菩提利濟衆生之行是即依理趣勝功力也或菩薩有直斷除四障頓證菩提人依此理趣功力云也經若能受持至執金剛位者是第二明生善功也就中有二初明行相後明所得功能也經若能受持作意思惟者初明修行相也是則思惠并修惠行也若指位者當住行向三賢位也經即於現生至執金剛位者後正明修行所得功能也就是修行所得功能文有二先初明得益時分謂現在生是也次第二正明修行所得利益就中亦有二先明因位中所得隨分利益花報於是中為三一者證一切法平等金剛三摩地二者於一切法皆得自在三者受於無量適悅歡喜也是即於初歡喜地所得功德是也一切法平等者是所證法空真如理也證者是能證法空智也金剛三摩地是法空智之所依定之名也若作祕釋者是即法佛內證三平等法也金剛三摩地者亦是真言門三摩地門之法也故菩提心論云第三三摩地者惟真言法中有於諸教中闕而不書云云於一切法皆得自在者亦是於真言法中得八自在十自在也十自在等義如餘所辨也受於無量適悅歡喜者得證此第一句大樂不空金剛普賢延命金剛薩埵位云也是即於初歡喜地方所得境界也經以十六大菩薩生獲得如來執金剛位者次就正明修行所得利益中是即次第二明修行所得果報相也謂是妙覺法佛果位也是於十六大菩薩生中即滿足第十六金剛拳菩薩位時方成就法佛之金剛不壞身云也此中以十六大菩薩生等者理實應言於第十六大菩薩生獲得如來執金剛位第十六拳菩薩即為如來執金剛位義者本釋之廣瑜伽中説身口意金剛合成名為拳一切如來縛是為金剛拳云云又略出經第四云從行者不闕至十六生畢定成佛云云此文意云滿十六生已即成佛果云云上十七尊曼荼羅是唯約金剛部明此一部因果義也今至于此金剛拳等十六大菩薩義亦此者廣通五部而明因果次第住地義也十六大菩薩具義如別抄廣述也上來初正明大樂不空金剛薩埵般若理趣義訖自下重第二明大樂金剛不空三摩耶本誓心真言也又解此中説三密觀也則前十七句為意密三摩地次從時薄伽梵至作勇進勢者明身密瑜伽也次説大樂金剛下説口密真言也是中薄伽梵者指金剛薩埵菩薩也是人則能具足此如上功德故此人能斷盡三界煩惱等故成就福德故生長悲智故又成就自在熾盛等六義故轉即立世尊號也是菩薩即示現真言門等覺位菩薩也行因海圓滿人故亦名為薄伽梵也下諸章中菩薩名為薄伽梵義準之可知也是即亦為教令輪降三世菩薩也是菩薩於大日尊所未受五智金剛杵以前即名云普賢菩薩也既被授五智金剛杵以後轉名金剛手也又即降伏魔醯首羅等以後即立降三世延命菩薩名也文欲重顯明此義故𤎹怡微笑者是以身業而標表自受法樂三密堺界義也下準之可知也具義如本釋中廣明也心真言字是今現在所流布理趣般若經及本釋心真言字皆安字也文句云實相般若經安長聲字也實言阿引入字云云問是三説相違何會答是經以吽字為金剛薩埵心真言是常途義也彼實相般若經以字為心真言義依有以普賢菩薩為金剛薩埵義也普賢菩薩是菩提心為因義也字因業不可得義豈不是意耶是破轉法輪菩薩真言以為種子是即金剛薩埵真言也故此章用為種子字也即以金剛薩埵為不動尊義故也是不動尊即以字為心真言義有故因之翻以唅字為金剛薩埵心真言也故有是説歟不動金剛大忿怒尊要誓抄集云不動尊者則不淨金剛也此不淨金剛者則降三世尊也此降三世尊者為金剛手菩薩也此金剛手菩薩者普賢也云云如仁王經軌者以金剛波羅蜜菩薩即為不動尊義有故也又彼文句以阿引入字為心真言義是若準金剛界供養會金剛薩埵真言以字為金剛薩埵種子字也故作此説歟雖作異説皆明邊邊義遂無相違咎也古人多分明虎𤙖反音也故蘇悉地經云虎吽二合者是説又吽呼垢反等也是此説反音太好也但後人直讀吽音牟甘反是字五佛頂經二云𤙖牟甘反云云又馬頭儀軌真言曰鳴吽者此反音意也安然云牛鳴聲呼此吽字文四字合成之中於第六摩多之字音即合插此字體之字音之未響音而直讀吽音牟甘反謂字即有衢云轉音此衢音之終響折取字音之上聲混合直呼吽音云也問抑具意云何答大師釋云釋經云此字因義因義者謂菩提為因即一切如來菩提心亦是一切如來不共真如妙體恆沙功德皆從此字生一字具四字義且字以為本體賀字從生由字一切法本不生故一切法因不可得其字中有汗聲之者一切法損減不可得其字頭上有圓點半月即為磨字磨字者一切法我不可得義我有二種所謂人我法我此二種皆妄情所執名為增益邊若離損減憎益即契中道云云今依此説一切如來不共真如妙體恆沙功德皆從字出生諸顯教以真如為諸法體性佛華法華等亦以此真如為至極理今真言法以字為一切真如等所依真如則所生之法真言則能生之法真如法體猶從此而生何況能證人乎能證佛既亦如是何況所説教法乎雖云能證所證平等無二然猶於二門真如作究竟之説迹逗此域影休此床無盡教義義從一聲生三種圓融優遊二門境誰信真如更有所依佛菩薩共有此説文云私云是中深義具釋如菩提心論私記上來第一章訖大樂經顯義抄上卷
