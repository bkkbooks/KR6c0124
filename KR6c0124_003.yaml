body:
  text: 大樂經顯義抄卷下經云時薄伽梵一切平等建立下第十一降三世教令輪章也文為三初明能説教主謂一切諸法若淨法若染法皆悉如來藏普賢理性而建立諸法故普賢性名云一切建立性也約法故阿毗達磨經頌云無始時來界一切法等依由此有諸趣及涅槃證得云云又楞伽經云如來藏善不善因受苦樂因俱若生若滅等又金剛頂經頌云普賢法身遍一切能為三界自在主無始無終無生滅性相常住等虛空一切如來所有心堅固菩提名薩埵心不動三摩地修習決定名金剛利衆生事諸悉地慈悲哀愍為加持云云是義意云從是普賢如來之理性即建立諸佛及一切法故立建立名也四部降三世菩薩之所護之境界四部法門亦是從普賢理性出現云也二者明所説理趣經云復説一切法平等乃至事業性應知者是也是所説理趣即前摧一切魔菩薩之可護境界是也此章則為欲顯示以前摧一切魔章之諸忿怒者所護法門即為此四部法教義也第三明語之密相經云時金剛手下是也就前第二所説理趣義中為三初總標經云復説一切法下是也意云此四部之法是即皆諸佛菩薩所護持正法境界也是法示能降伏諸魔王之能伏法也於一切如來正法輪中普悉皆護持而令增長之能欲不令毀壞之最勝要誓本願之所依境界即是法也故云一切法三摩耶最勝出生也第二釋理趣義中經一切平等至平等性者是明第一金剛部降三世教令輪者之所護法門義也就中有二初明所護法謂一切平等性故者是也此句具意如上第二章中所釋金剛平等義也又金剛平等者本覺大圓鏡有一切衆生心藏中之也般若波羅蜜多平等性者是能護人也是意是為欲顯示能護教令輪人則依止所護金剛部法境義也經一切義利至義利性者第二明寶部軍荼利尊教令輪者也文有二初明所護法謂一切義利性故者是舉所護法也般若波羅蜜多義利性者是舉能護人也經一切法性至性故者第三明蓮華部教令輪者馬頭觀音也文有二初舉所護法也謂一切平等性故者是也次舉能護人謂般若波羅蜜多法性故者是能護人也經一切事業至事業性者是明第四羯磨部教令輪者金剛藥叉尊也文有二初一切事業性故者舉所護法也般若波羅蜜多事業性者明能護人也是已上四重般若者是能觀智德即是能證護人也此四部降三世明王領知四部教法故名降三世教令輪章也問此中寶部以下明軍荼利馬頭金剛藥叉尊義何名降三世教令輪章耶答此或約初尊得此名或後三尊亦得名降三世尊義故也乍四部俱各各更有實降三世尊義也問以何得知是四部法是通所證境界義耶答本釋云金剛部中言證得如金剛佛性寶部中言證得如虛空真如蓮華部中言證得清淨法界羯磨部中言獲得迅疾身口意等故也文是四法皆示所證境界所行法也正不取能證人也古德傳云今五大尊斷惑形五佛理證相也何故爾忿怒體金剛喻定入一剎那加行形也四智圓滿形受諸佛潅頂時成覺時形也云云此説好也文句云問前第三章與此第十一章同異如何答恐前唯為金剛部此則通四部耳云云此義意云約能護人有別有通故二章所明義異也云也今又私案云前第三章唯約能護人而唯明金剛部中教令輪義是第十一章約所護法而通明四部教令輪之法義也故前後三章義異也已上第十一章畢經云時薄伽梵如來下第十二外金剛部會章也文為三第一能説主即大日尊是也第二所説法經云復説一切至性相應故者是也第三明身語二密相也經云時外金剛部下是也就第二文為二初總標經云復説一切有情加持等者是也是義約人是四部也約法則明金剛部寶部蓮華部羯磨部四種皆具不闕減義也此中一切有情加持者是自他平等加持義也此義如祕藏記云一切衆生身中本來自性理與吾及諸佛自性理等無差別而衆生不覺輪回生死又云吾三業本來清淨遍法界我三業與他衆生三業不相障礙譬如千燈光明不相障礙故云云是則加持義也自他佛性相加攝持故也又得感應和合加持義也應是加義也感持義也經云所謂一切有情至性相應故者第二釋四種理趣義也就中文有四也謂明四部法也經云一切有情至一切我故者是第一明金剛部自他平等義也文一切有性如來藏者是標金剛部平等遍在一切衆生身義也謂一切衆生身悉皆具足不空如來藏萬德性也其所以者普賢常住不變我德理性即遍在一切衆生身中不壞不失尚如金剛不阻壞也則以具足此不壞理性以此理性為因而一切有情遂則成大圓鏡智金剛部果云也約人即普賢菩薩是也故云以普賢菩薩一切我故也以前所引普賢法身遍一切等頌可得此義意也經云一切有情金剛藏至潅頂故者第二明寶部自他平等義也文一切有情金剛藏者是表寶部平等遍在義也又金剛藏潅頂故者釋所以也謂於一切有情中有金剛寶藏性者因是遂應得平等性智寶部果故也以可尊可重珍寶福德義邊名云金剛寶藏也約人虛空藏菩薩是也經云一切有情妙法藏至語言故者第三標蓮華部自他平等遍在義也文一切有情妙法藏者標一切衆生普有蓮華部性淨義也謂遂有可得妙觀察智之説法斷疑之果性故也約人觀自在菩薩是也經云一切有情羯磨至性相應故者第四明羯磨部平等遍在義也文一切有情羯磨藏者標羯磨部自他平等遍在一切衆生身義也文能作所作相應故者釋所以也謂一切衆生有遂所應得利他門之能作所作相應三業自在之成所作智之性故也約人即金剛業菩薩是也問本釋云即四大菩薩現轉輪王是也云云其轉輪王者何人耶答大妙金剛熾盛佛頂經云爾時八大菩薩復説八大密印及一字真言爾時八大菩薩復各各現作光明輪王各現作八大金剛明王以持如來輪故爾時金剛手菩薩現作降三世金剛明王乃至爾時虛空藏菩薩現作大笑金剛明王乃至爾時觀自在菩薩於頂上現作馬頭明王乃至爾時地藏菩薩現作無能勝金剛明王云云又準尊勝儀軌説者金剛手白傘蓋佛頂輪王虛空藏光聚佛頂輪王除蓋障尊勝佛頂輪王業菩薩最勝佛頂輪王也文經云時外金剛部下第三明身口二密相也謂聞此四部法中真如本覺法身平等平等遍在一切有情義故自他衆生遂佛道義故而外金剛部諸世天等聞是説即成歡喜心之相而外儀説心真言云也本釋所云外金剛部二十五天者金剛界外部二十天更加五天也真二十天外之五天多是天女位也詳不知何天也可尋之陀羅尼門諸部要目云又外有五類天一一類有四天總有二十並應復有五類成二十五類者上界四天住虛空四天遊虛空四天地居有四天云云無地下天義也祕藏記云五類諸天上界天色界及無色界虛空天夜摩天以上四天地居天四天王天忉利天遊虛空天日月星辰地下天龍阿修羅及閻摩王等云云私云若依祕藏記意者於上界開為八天謂無色界四天色界四天也依此義即欲開成二十五天也謂上界有八天亦住虛空四天遊虛空四天地居四天地下有五天故成二十五種也地下五天者龍天地天及閻摩天阿修羅天是也文句云問上第二章與此第十二章同異如何答恐是本迹異耳云云今又私云第二章但約果人説四智果德也今此十二章又約理説此四智菩提普遍在一切有情義也故本釋云毗盧遮那佛為世間同類攝化説摩醯首羅曼荼羅若依世俗是名外曼荼羅若依勝義則為普賢曼荼羅以事顯於理故即事即理理事不相礙故即凡即聖相性同一真如也云云坦唎字為種子是表凡聖真如平等義清淨義也已上第十二章畢經云爾時七母至真實心者第十三七母天章也文為三初明能説人是七母女天也是人為護前所説教令法及能修行者故説心真言也次二章準之可知也大日經疏五云七摩怛里譯云七母皆女鬼也其形悉皆黑色云云次正説身密印相也獻鉤召者以金剛鉤印而能召一一兩足多足等諸有情類也入者以金剛索印引入曼荼羅乃引入佛道也能殺者殺害毀壞正法損害多有情者殺害不善心也能成者令修真言行離世間障難速得悉地也能殺能成者堅固安住與得益歡喜義也大疏卷十七云七母等為人害者亦遠而敬禮云云私云本是雖害衆生惡鬼今者成善心而殺惡生善也七母者大日經義釋云七母是焰魔部主諸鬼魅之類凡有七姊妹也一左悶拏二嫡伏里三伏瑟拏四矯摩里五印㮈里六勞奈里七末羅呬弭是七名皆是真言也文十五卷義釋第五文也三昧耶者是第三説彼天女本誓義也真實心者心真言是也毗欲字是也本釋云真實心者毗欲字是毗字一切法三有不可得欲字一切乘不可得由三有有情種種愛樂勝解不同是故如來出興于世説五乘所謂天乘梵乘聲聞乘緣覺乘大乘文今解曰此中真言意云是以欲界一切諸天有漏善果者令得假有出苦利益義即此天乘之義趣也故以一切法有不可得字為種子真言又以一切法乘不可得字為天乘義故又以寄約一切法譬喻不可得字即成立此天乘義然則以此七母鬼者即為天乘所攝法也毗欲字為真言也又彼梵乘者當色界無色界天乘也已上第十三章經云爾時末度至自心真言者第十四三兄弟章文為三初明能説人次明身密威儀復明心真言相也謂末度羯羅三兄弟者本釋云是梵王那羅延摩醯首羅異名也此三表佛法中三寶三身佛寶者是則金剛薩埵法寶者觀自在菩薩僧寶者是虛空藏菩薩此三者皆從毗盧舍那心菩提心中流出亦名三法兄弟以事顯理也文善珠僧正明燈抄云外道計云摩醯首羅為法身毗紐天為報身梵王為化身文如本文者難云列梵王那羅延摩醯首羅而本經只明大自在天名是天劫初時生人故立此名也文末度者大疏第二云經云若摩奴闍者智度論翻為人即是人執也具譯當言人生此是自在天外道部類計人即從人生故以為名又云經云摩納婆者是毗紐天外道部類計正翻應言勝我於身心中最為勝妙也文私云納音者不可呼度音也而此經中無省下闍字若婆字者非而略以只云末度也文迦羅者大疏第十七云迦羅時三昧時即是我也文解云此迦羅名時者即當劫初時也是梵王之名也謂梵王者劫初時最前出現故立此名歟又云迦羅者黑義也如大黑天神云摩訶迦羅也文此伽羅翻黑者是當冥初之時也冥初時者是劫初時始出現梵王時是也而諸梵衆不了知之故指彼時為黑暗時也大疏第五云毗紐此是那羅延天也文若依此説者此末度闍與毗紐天者是即同體異名也又大疏十七云韋紐天自在天別名云云摩度迦羅者是者上商言只云迦羅也如基因明疏云商羯羅者此云骨鎖劫初梵王下化人間以苦行形骨鎖相連文但此經者上商之言而只云迦羅此天生人故云末度而此經文顯雖不明摩醯首羅名而以隱之言表顯之無失也又以等言即等取餘二天王也但亦等取餘以外第二第三禪王及欲界樂變化天以下五天王也入大乘論云摩醯首羅有二種一毗遮摩醯首羅第四禪王二伊舍那魔醯首羅第六天王也文今是者第四禪摩醯首羅天王也問毗紐天亦有名人主義耶答智論第八云劫盡燒時一切皆空衆生福德因緣力故十方風至能令風風相吹風風相持水上有一千頭人二千手足化從水出名曰韋紐此天臍中有一千葉蓮華華中有光如萬日並照有一梵王因此花生亦放光明如前梵王作此念此處何故空無衆生作是念時光音天下命終者應生此土有八天子一時化生此八子念我從梵王生梵王亦念我生此八天子從此八子生天地人民萬物文此文出大安寺安澄百論疏記已上第十四章畢經云爾時四姊妹女天獻自心真言者第十五四姊妹章也文為二初明説主後明説真言也注理趣經云四姊妹女者第一名惹耶第二名微惹耶第三名阿爾多第四名阿波羅爾多云云大疏五云誓耶譯為勝頂微捨耶譯云最勝頂也又疏第五云日天二妃在其左右所謂誓耶微誓耶譯云勝無勝文又疏云阿爾多者無勝義阿波羅爾多者無能勝義也云云以此文説可準知誓耶等名之翻號也又二卷孔雀呪王經云阿波羅爾多名云不稱云云本釋云此四天亦有曼荼羅中央畫都牟盧天此四姊妹之兄也四姊妹者表瑜伽中四波羅蜜所謂常樂我淨波羅蜜是也都牟盧表毗盧舍那佛云云已上第十五章畢經云時薄伽梵無量無邊下第十六四波羅蜜中大曼荼羅章也文為五初明能説主即佛部是大日尊是也二者總標所説教起因緣謂文云為欲加持此教令究竟圓滿故者是也此中加持者是感應和合加持義也謂所被機感故能應佛即垂加護云也意云於此前所説四部大曼荼羅之四智四波羅蜜法究竟而為欲令圓滿成就真言門之菩提行故重説此四部大曼荼羅法互圓融相攝之義大意也前十二章且一往顯示佛界衆生界同一本覺義也今至第十六章重明佛界衆生界中各各皆所具足四智四波羅蜜法互各各皆一一相攝義也一一部各備五部曼荼羅也此義如祕藏記云即五智所互具五智所以成二十五部如是展轉有無量部云云三者經云復説平等至般若理趣者是總標所説法大意也謂明四部曼荼羅各各皆悉互相攝平等云云無差別義云也四者經云所謂般若至波羅蜜多究竟者是釋所説理趣義也文有四別一者文云般若波羅蜜至如來無量者是明於第一金剛部中曼荼羅悉具足餘四部曼荼羅法故此中一一聖衆亦更皆悉具足無量曼荼羅四印等無窮盡也此意云上句有所依性得法能攝諸法無盡義故約其下句示能依修得智品亦有攝法無盡義也又下三部攝法義準之可知也文云般若波羅蜜多無邊故一切如來無邊者是第二明於寶部曼荼羅亦具足餘四部曼荼羅故此中一一四部亦具足無邊聖衆無窮盡云也文云一切法一性故至多一性者第三明於蓮華部中具足四部曼荼羅四印等故其中聖衆復無量無數皆悉為同一清淨一法界性云也謂是無漏無為常住真實不生不滅甘露一味也文云一切法究竟至多究竟者第四明於羯磨部中亦具足四部曼荼羅四印等皆悉同成就一味一相義故此諸聖衆皆悉究竟成三德一體法安住大般涅槃果義也重解已上四部法中一一法各各上句是明本覺理性也其各各下句明始覺佛果也謂依本覺正因佛性力而得始覺佛果云也又所緣境界無量故能緣智亦無量等也如智度論云智及智處名為般若者其義當此意也五者經云金剛手下是歎德也就中有二初明修行相文云若有聞此下是也次正歎究竟得果益經云彼於菩薩行下是也本釋云此章中所以不説心真言者彼教中一一聖衆各各有一字心真言不可具載云云具如四種曼荼羅義頌云法然具足薩波若心數心王過剎塵各具五智無際智圓鏡力故實覺智云云私云頌意正通此章義意也已上第十六章畢經云時薄伽梵毗盧舍那下第十七金剛薩埵五祕密章也又為四第一明能説主經云毗盧舍那至無戲論如來者是也尚約因位名金剛薩埵菩薩也約果地得佛名也第二總標所説理趣經云復説最勝至般若理趣者是也文無初中後者上序分文云初中後善今至此中云無初中後者謂顯了明上第二第十二第十六章所明四部三密曼荼羅無始無終無中無邊平等一相義究竟理趣義也謂且金剛部即是佛部佛部即金剛部金剛部即寶部寶部即金剛部金剛部即蓮華部蓮華部即金剛部金剛部即羯磨部乃至佛部即羯磨部羯磨部即佛部等也餘一一部相即圓融而無中邊無始無終無本來義準之可知也且以佛部金剛部為始以寶部蓮華部為中以羯磨部為後義也而理實無本末始終前後云也故二教論云此明三十七尊根本五智各具恆沙性德若約次第有出現之文若據本有俱時圓滿如是諸德文又解約上十六章有前後次第差別義也今章意是十七章皆悉一相一味之金剛不壞義混泯而無差別果德義云也是即以上諸章所明皆悉盡攝入此金剛薩埵之果地也又且約第一金剛薩埵十七尊而必定無前後次第也渭混融該攝無前後差別也今金剛薩埵五祕密法意是也又解約上第一章有十七尊次第也而至于今第十七章既有次第不同列義也而且上列妙適第一欲箭第二觸第三愛縛第四一切自在主第五也今此第十七章中且約主伴互融通五尊義欲金剛第一觸金剛第二妙適金剛薩埵第三第四愛金剛第五慢金剛是也一切自在主者是我義也我是帶慢義也不煩惱所攝我也意云上第一章中一往雖有如是次第列義而理實是不有如是定次第也謂一一諸尊皆有主伴互為義故也何有定上中下次第位耶云也故上第一章最初安本主金剛薩埵如次列末位四親近菩薩也至于今第十七章先列末位之欲金剛觸金剛二位次中間列本位金剛薩埵而次列末位愛金剛慢金剛二位即此義也故可知此經正宗於金剛部中該攝餘一切四部曼荼羅法故即以金剛薩埵章為初後二章而於其中間安十五章意者即於此金剛部以攝盡一切五部諸尊曼荼羅法而為顯示此內證三密法圓融無礙自在平等義也又此無初中後者顯示法佛法然果德之遠離三世無常相義也如大疏云越三時如來日加持等者是也經云大樂金剛不空三昧耶者是大樂即金剛薩埵佛部也金剛者初親近欲金剛菩薩是金剛部也不空者理實此句有二義一者不空是第二觸金剛菩薩位是即寶部也二者真實是蓮華部也即第三愛金剛菩薩位也但是中所以不別開二句者是不空義即帶真實義故也不空者是離虛妄咎義也真實者成就實有德義故實是無二別義也三摩耶者第四慢金剛菩薩位是也是羯磨部也問若爾者云何次釋句經文正指第一欲金剛菩薩云得大樂最勝成就耶答理實是一曼荼羅諸尊亦互皆悉具足五部五智故且指第一欲金剛云大樂最勝成就故經云無初中後者是義意也雖然尚依本位者中台薩埵名為佛部大樂義也金剛法性等者是五尊及十七尊者示併皆究竟理智即一法身也亦即示本覺真如體性者一味平等義云義也第三明釋理趣經云所謂菩薩至能作堅固利者是也文有長行偈頌且就初長行中有五經云菩薩摩訶薩至大樂最勝成就者第一明欲金剛真言三摩地行也經云菩薩摩訶薩至最勝成就者第二明觸金剛真言三摩地行也經云金剛得一切如來至摧大力魔最勝成就者第三明金剛薩埵真言三摩地行也經云菩薩摩訶薩至自在主成就菩薩者是第四明愛金剛真言三摩地行也經云菩薩摩訶薩得一切至皆悉成就者第五明慢金剛真言三摩地行也凡此五尊三摩地之生起次第由來意云依欲貪心成故妙觸樂行成就也依妙觸樂行故成就大安樂大菩提果也彼妙觸行是法身智德也是依修學三密行即親觸本有法身境界云也又依自證大菩提最勝果成就故亦為利他故更示現摧破三界大力魔王也此忿怒降魔用即是依大悲願力而所示現也又依成就此降魔大力用故凡更遍在三界中而無礙無障利益諸衆生也故被大精進被甲遊於生死間利益安樂一切衆生自在無礙而無休息義也是五尊行三德猶是金剛薩埵之一體用別門也更無異人也故本釋云今説修行曼荼羅像同一蓮華座同一圓光中央畫金剛薩埵菩薩右邊畫二種明妃本形右邊亦畫二種云云即是義意也後就偈頌中文云菩薩勝惠者至而不趣涅槃者是本位金剛薩埵菩薩三摩地門也此金剛薩埵內證法爾常住三密法都不趣二乘所求灰滅涅槃而常作利他事業也即是無住處涅槃也文云般若及方便至一切皆清淨者是第二明初親近菩薩欲金剛位三摩地也此文意云於十度中依第六七十之共同加持助成力故有情與法令離染歸淨云也初般若者俗智也次方便者通真俗二智後智度者是真智也文云欲等調世間至調伏盡諸有者第三明第二親近觸金剛位三摩地也以三密門中之無漏觸欲妙行而對治世間觸煩惱也文云妙蓮體本染至不染利群生者是第四明第三親近愛金剛位三摩地行也謂如蓮華本雖在汚泥中而為濁泥不被染也愛金剛義亦爾也是即雖云有染愛義即成其自性清淨法也是為大悲願力所染而自性本淨云也此説有釋中也菩提留支所譯實相般若經云如蓮體本淨也是此不空三藏意者是取蓮之從本生長遊泥中義也彼留支三藏意者是取蓮之性淨而不染客塵垢穢義也文云大欲得清淨至能作堅固利者是第五明第四親近菩薩之慢金剛位也是即精進自在而離諸四魔障難懈怠留礙義也據本釋意者第四慢菩薩三摩地門中更開釋四部義也故文云大欲得清淨金剛大安樂富饒寶三界得自在蓮能作堅固利羯磨則成金剛薩埵毗盧遮那佛大悲行願身也云云私云準之可知又餘欲等三種菩薩亦具四部法也第四歎修行功能就中有二初明修行相文云若有聞此下是也此中日日晨朝者取明相初發時義而況類行者之聞思修云惠初發生義也大疏十云至日出是成明相如大日照世間也於此時中或有吽聲云云二歎得益也就中有三初明得歡喜地益文云彼獲一切至究竟悉地者是也是歎修學是三密門理趣瑜伽行人即證得此金剛薩埵內證大安樂三摩地門法云也文云現世獲得至自在悅樂者第二歎得益時節甚近促義也文云以十六至執金剛位者第三者讃歎現生證入第十六金剛拳菩薩位也是若約一途説者當究竟妙覺位也三業者悉成金剛不懷身湛然靜寂常住不動義也此次有吽字心真言如前第一章字義也但此中或經本有重體字與上第一章中吽字異未得其差意也問二重吽字何義意答今私云此第十七章者前金剛薩埵之一字心真言更亦重説故是説二重吽字歟但大疏第九云所謂吽𤙖字也𤙖是恐怖彼聲所以重言之者一摧外障一摧內障復次外是煩惱障內是智障文又十卷疏十云吽吽此是真言亦是具三解脫義也初為因後為果因是如來之行果即成佛也云云今私云重體𤙖字即存此等義意耳金剛薩埵種子用重體吽字説可檢瑜祇經也已上十七章畢經文云爾時一切如來下有長行及三行半偈頌也文句釋云從爾時一切如來以下大段第二明總歎理趣功能就中為二先散序次攝讃讃中有三頌半文分為二前兩頌半正明讃歎理趣功德後一頌明奉行流通然以此讃歎文或為正説或為流通蘭菊各檀其美不可互相是非中為二初一頌半讃能説者次一頌讃能持者初文如釋次文中二初句明行相次三句正明功能報此中有三種報一魔不壞二得聖位三得悉地三句三種如次配釋從一切以下第三明奉行流通分也其七言偈上代兩句為一偈後世四句為一頌今且依後代分之然智度論中亦以七言四句為一頌也云云問本釋云五種善哉句從金剛部配乃至佛部云云然檢經正文以善能演説此法教句可配羯磨部也何以此句可配佛部等耶答私案云以五種善哉配五部中且以四種善哉以次可配金剛部寶部蓮華部佛部云也但遂以第五句可配羯磨部云也不爾者文義相違也問若爾者本釋所言乃至佛部書言者何會耶答是第五羯磨部是於諸部中普通作業之用也故且置此羯磨部業用義不云是也所以者只就法體邊而論其次第時為一金剛部第二寶部第三蓮華部第四佛部也以此義故理趣釋云從金剛部配乃至佛部云云而以第五羯磨部普通諸部義也故諸諸本書云羯磨部無別體通諸部者此義也問何故於下第十七金剛薩埵五祕密章中重體吽字耶答為表以金剛部金剛薩埵用初後二章義故於彼五祕密章者用重體吽義也此初後二章是雖無別異體以廣略重説故成異説也大樂經顯義抄卷下
