body:
  text: 大樂經顯義抄卷中經時薄伽梵毗盧舍那如來已下是第二毗盧舍那章也大文為三初第一明能説主第二正明所説理趣義次第三明身密印及心真言也就第二中為三初第一總標章經復説一切如來至般若理趣者是也文寂靜法性現等覺者是理智雙舉也寂靜法性者是理也現等覺者是智也理智即一名為此章大綱也意云寂靜法性者是法界體性智也現等覺者四智心品也出生般若等者從此五智品則出生餘無量智品也第二次釋義經所謂金剛至無分別性故者是也第三歎法德經金剛手有無上正覺者是也毗盧舍那者金剛頂義決云梵云毗盧舍那此翻最高顯廣眼如來毗者最高顯也盧遮那者廣眼也先有翻為遍照如來也又有翻為大日如來此並略而名義闕也又此如來亦名佛菩提眼如來等云悉曇藏四云據十一面真言首云曩謨囉怛那怛囉野也曩謨阿哩野枳攘野吠魯遮那野毗庾迦囉惹野怛他誐哆野抄此云歸命三寶歸命聖智遍照海王如來文私云是遍照名是不當正翻也經金剛平等現等覺下就釋義中經金剛平等現等覺至金剛堅固故者是明四智四波羅蜜之中是明大圓鏡智之金剛波羅蜜義也於此四句有二義初約法釋義後約人釋義也初約法釋義者謂金剛是大圓鏡智之體用堅固而斷滅無始無明住地及微細法執所知障故云以大菩提金剛堅固故也金剛平等現等覺者是大圓鏡智之略名也轉捨異熟識現得此鏡智也金剛者自性不壞堅固性及能摧破用也平等者此鏡智能平等影現衆法影像故云平等也現等覺者此鏡智即是一切種智也普了達真俗一切境界故云現等覺也經義平等現等覺至一義利故者第二明平等性智也謂轉滅有漏末那識而現得入無漏平等性智也是末那從昔以來緣第八阿賴耶識成我我所執而與執見分別相應也故唯識論翻云染意也又心地歡經名我見識也而今義平等現等覺者此無漏位第七識即現得法無我觀而緣法身如來無垢識及所攝之恆沙萬德而遠離能所差別之執取相故立義平等現等覺之名也又謂識及所攝法皆成就法爾常住一味相故名平等也以大菩提一義利故者謂是平等性智能了達於法佛內證無垢淨識及識所持十佛剎微塵數之心數諸功德法是法雖無量無盡而皆悉一味常住堅固性故名云以大菩提一義利故也經法平等現等覺至自性清淨故者第三明妙觀察智相也謂是智轉有漏第六意識現得無漏妙觀察智也是智普觀察諸法自共相而了達證得諸法之自性清淨本來寂滅理云覺也而亦為利他普轉妙法輪而斷衆會疑網故云法平等現等覺以大菩提自性清淨故也經一切業平等至無分別性故者是第四明成所作智相也是智轉有漏前五識現得此成事智也是五識於有漏位有尋伺之分別唯各各緣了自分五塵自境而無廣緣了達諸法空性也而今至於無漏果位遠離尋伺分別而廣了一切諸法相及法空之性也又於俗事境以任運無功用智趣三業化用廣作利他行也是任運無功用無分別行也已上四智是約法之名也後約人釋義者是即四波羅蜜之菩薩是也如菩提心論教王經説者從四智出生四波羅蜜菩薩也是明從本垂迹之義也如祕藏記者從四波羅蜜菩薩而出生四智云也是當行因至果之義也經金剛平等現等覺者謂於金剛部中即示現金剛波羅蜜菩薩云也是菩薩即是標顯示現等覺無垢位故云現等覺也自下三波羅蜜菩薩準之可知也經以大菩提金剛堅固故者是返釋上名金剛平等句之意也經義平等故者明寶部義也寶部菩薩是有實義利益而普饒益一切衆生故云義平等也經現等覺者於寶部中示現寶波羅蜜菩薩云也經以大菩提一義利故者返釋上名平等句一味義利益意也經法平等者是明蓮華部法也經現等覺者是即明示現法波羅蜜菩薩也經以大菩提自性清淨故者釋上法平等句意也經一切業平等者明羯磨部義也經現等覺者示現業波羅蜜菩薩也經以大菩提一切分別無分別性故者返釋上一切業平等句意也是以無功用無分別行之任運三業化用利益法界一切衆生云也意云無加行之用而自在起化用云也一切分別者是五識昔與尋伺之分別相應義也故俱舍頌云五識唯尋伺者即是義也然今是成事智無分別義如金光明經第一云二者佛於衆生不作是念此諸愚夫行顛倒見為諸煩惱之所纒迫我今明語令其得解脫然由往昔慈善根力於彼有情隨其根性意樂勝解不起分別任運濟度示教利喜盡未來際無有窮盡是如來行云云是義即當是一切分別無分別義之成事智也文句云此中則有四句即是如次配釋中央四智四波羅蜜云云是意即以此四句配釋人法各各四義云也四部法之約智邊得四佛義約定邊而得四波羅蜜菩薩義也問此章中既明四智佛四波羅蜜菩薩義而何云毗盧舍那章耶答四智四波羅蜜是法界智之作用也法界智是四波羅蜜之體性也法界智者四智之自性常住不變易義邊云法界性智也法界性智之照了物之緣用之不同且名云四智也故舉末用而本意攝取本體也故取本體之大日尊而名毗盧舍那章無失也問何故先列金剛薩埵章次是安毗盧舍那章耶答是先明因位圓滿章次安究竟果海圓滿義也問如本釋説者此毗盧舍那章是大日尊於色究竟天而説此四智菩薩句章云云而何於是欲界頂他化天説理趣般若經中為用彼色界頂説毗盧舍那佛之四智法門耶答云是義有二意一者謂於是舍經中重説彼前所説毗盧舍那四智法門故則指彼説也二者謂於色界頂説四智菩提義處即豈可攝於欲界頂説四智菩提處耶皆是同時同處説法義色頂與欲界頂豈異處也次第三章準之可知也經金剛手若有下第三歎法德也就中為二先明修行相經若有聞此至讀誦受持者是也二正明功能經説使現行至無上正覺者是也就先明修行相有三行也一者聞惠行二者思惠行也讀誦受持者思惠行也就第二正明功能中有二一者明滅惡趣功經設使現行至一切惡趣者是也二者明生善功也經乃至當坐至無上正覺者是也謂從初發信心位至成佛位若干劫數其中間不墮惡趣云也上來第一明釋義門章經時薄伽梵至自性平等心者次明身印及心真言也經持智拳印者是明身密也是中心真言字因行證入四字合成以字為真言也是即依從因向果義成是字義也是如次以四阿字配四智菩提心真言也第四字是入涅槃義也涅槃四種所謂一本來自性清淨涅槃二有餘涅槃三無餘涅槃四無住處涅槃也而此第四惡字當無住處涅槃義也無住處涅槃者是有二義一者淺略義如唯識論云大悲般若常所扶翼由此不住生死涅槃等云云二者深祕義如金光明經云依此三身一切諸佛説無住處涅槃為二身故不住涅槃離於法身無有別佛何故二身不住涅槃二身假名不實念念生滅不定性故數數出現以不定故法身不爾是故二身不住涅槃法身不二是故不住涅槃故依三身説無住涅槃云云又義四種涅槃如常義若準涅槃經四種涅槃之外更説三德一體大般涅槃法也是當第五惡字方便具足大涅槃義也此章中又具足十七尊位具如本釋明也已上第二章畢經時調伏難調下第三降三世章也就中為三初第一明能説主第二直明所説理趣義後第三説心真言也是中能説主釋迦尊也就第二中為三第一標章第二釋義第三歎法德也經復説一切法至般若理趣者第一標章也經所謂欲無至無戲論性者第二釋義也經金剛手若有至正等菩提者第三歎法功也釋迦牟尼者是能説主也是即正法輪身也是佛正為二乘凡夫地前菩薩説一乘三乘五乘法也以此法流傳世間為修行之人而成利益安樂行也因之則邪魔外道成障難及為是正法則成怨嫉障礙留難毀謗及而摧壞此法也此故佛則為示現忿怒可畏相而守護正法統貪教令故即名云降三世尊教令輪者也然則釋迦尊是正法輪身也降三世尊即是教令輪身也故此章中降三世是且約統領應化身佛所説教義而名降三世尊也摧一切魔章中降三世尊通統領三身教法也是故第三章降三世者即與釋迦正法輪身合説意在此中問此第三章但名云降三世章也何故如第十一章此第三章不名降三世教令輪章耶答略有二義一者是第三章亦可名降三世教令輪章也而略單名降三世章也理實可名降三世教令輪也知爾所以者釋是第三章理趣釋正文云於須彌三十三天金剛峯寶樓閣中毗盧舍那佛轉法輪輪有四種所謂金剛輪寶輪法輪羯磨輪其四輪皆攝在二輪中所謂正法輪教令輪云云故知爾也故理實此第三章亦可名降三世教令輪章也是忿怒尊必領如教令輪義具足故別是第三章雖不立降三世教令輪章之號理實有此義也二者是第三章直明能守護正法之人故且立降三世章名也後第十一章是兼約明所護法門而能護人與所護正法合而名降三世教令輪章也意云金剛部等者欲取能護人與所護法此四部法是降三世菩薩之所護境界教法也而明能護人所護法合故名云降三世教令輪章也是即相違釋義也又是降三世教令輪者依主釋意也是即舉能護人而欲顯所護教法之意也章云下第十摧一切魔章之中所説降三世尊之所護所證法是第十一降三世教令輪章所明四部法即是也就第二釋義中文句云釋中自有四句如次配釋東方四大菩薩瑜伽三摩地謂忿怒薩埵忿怒善哉忿怒王忿怒愛又云如次配釋薩王愛喜又本釋云五種無戲論智成降三世曼荼羅中央安降三世前安忿怒薩埵後安忿怒善哉右邊安忿怒王左邊安忿怒愛四內隅安四忿怒內供養於外四隅安四忿怒外供養等云云般若波羅蜜多無戲論性者是即當中央降三世明王也若約法釋義者欲無戲論性故者是三毒中貪煩惱之自性是無性寂滅性也謂貪等心是四緣所成法故性空假有法也且約性空義故云無戲論性也嗔癡二惑亦爾也一切法無戲論性者亦是一切有為之中有漏諸法亦依三毒煩惱而成亦四緣所成故有性空理故同具無戲論義也難論者假名言説云事也是有四句一者有二無三非有非無四亦不非有亦不非無也常無常等四句準之可知也是四句皆非與諸法實相理相應故名云戲論也諸法實相離有無等諸言説相故也謂言語道斷又心行處滅故即諸法實相名云無戲論也應知般若波羅蜜多無戲論性者即是於真如實相法之其能證本覺始覺智同皆遠離假名斷絶妄想也是名無戲論之實相也經設害三界至正等菩提者第二明功報也報中有二一者不墮惡趣報經云設害三界至為調伏故者第一明不墮惡趣報也本釋云害三界一切有情者由貪嗔癡為因受三界中流轉若與般若理趣相應則滅三界輪回因是故害三界一切有情不墮惡趣為調伏貪等三毒也故得速證無上菩提是故如來密意作如是説云云設者若是假令義也若假令殺彼三界一切有情義是約難成辨之廣多義云設也此義意是取假令事也例如不動尊法云假使滿世間大力諸藥叉明降伏盡令證大菩提云云此言設害三界三界等者亦復如是也若於此理趣法有得發生聞惠思惠修惠三行者假令廣是雖設害一切衆生而是人能殺彼三界衆生之三毒煩惱等能利自他有情令不墮惡趣云也例如降三世菩薩殺害魔醯首羅天王而令成佛義也問雖受持是經有殺生業云何不墮惡趣耶答依三毒造罪人趣惡道也依三善根所作殺生業等不墮惡趣也以方便善巧智為利他造善業故也第二大段金剛手大菩薩下説心真言也此中以蓮華面至住降伏立相者是明身密相也上來明正法輪故後明此教令輪也哞迦羅者是勝三世義也已上第三章畢經時薄伽梵得自性清淨如來下第四章也例前為三先初説能説主即無量壽佛是也次第二明所説理趣次第三説身口二密法也就第二明所説理趣中為三一者標章經後説一切至般若理趣者第一標章也二者釋理趣經云所謂世間至般若波羅蜜多清淨者是也第三歎德經云金剛手若有聞此至無上正等菩提者是也標中一切法平等觀自在智印出生般若理趣者是妙觀察智三摩地門也諸法自共相皆悉本來寂滅平等真如性故即觀是理之正智即名妙觀察智也是智説法斷疑用殊勝餘智名云最勝也是智能出生諸佛菩薩等無量智門故名云出生般若理趣也就釋理趣中經世間一切欲至瞋清淨者第一明西方法菩薩之三摩地門也意云世間欲清淨故者約法菩薩之三昧門即明行觀察世間諸欲煩惱是衆緣所成義故如幻如夢假有真空本來自性不染義也則一切瞋清淨者是明瞋煩惱亦無自性不染義也是且舉貪瞋二惑之不染義而為取餘惑亦同不染義也經世間一切垢至一切罪清淨者明第二利菩薩三摩地門也是中觀癡煩惱及諸惡見惑障之自性寂滅不生義也癡煩惱名為垢義癡是無知惑也具帶塵垢義故是暗昧相故名垢也一切罪者五見是衆罪根本故也是即癡所攝也依我執而流轉生死依見取見戒取見邪見三惑而發生業縛故名見煩惱即為罪也今舉根本三毒五見而攝取一切餘諸染品也而今觀如是罪自性如幻如夢本來寂滅自性不染義而即是了達緣生法本不生理故云爾也又解一切罪者是依貪等三毒所起一切善業是也謂十惡五逆等也多分依癡起惡業也經世間一切法至有情清淨者明第三金剛因菩薩三摩地也意云觀知世間有為有漏五蘊十二處十八界等諸法皆悉自性假有而本來寂滅義也謂如來藏為諸法因之義即自然觀知諸衆生性空理也依五蘊法而建立有情故則知法空理故即知有情性空義云也經世間一切智智至波羅蜜多清淨者明第四語菩薩三摩地門也謂覺知如上三毒五見及餘有漏諸法之性空假有義故即得入一切智智清淨門而為諸衆生説此法門云也得入此一切智智清淨門即是得覺達般若波羅蜜清清云也經若有聞此下第三歎德中為二初明行相也謂聽聞受持讀誦思惟五行也經設住諸欲下正明功德報報中又二先明不染惑德後明證果德也經時薄伽梵下第二大段明身口二密法也理趣釋云中央畫觀自在菩薩前安金剛法右安利菩薩左安因菩薩後安語菩薩於四內外隅各安四內外供養云問若爾者中央觀自在菩薩與前安金剛法菩薩有何差別義耶答且私案義云中臺觀音正以見四法合集總相德備人以為觀世音也餘四菩薩取各別德也又中央觀音是表妙覺圓滿極位菩薩也前安日輪觀音是表等覺入住心菩薩歟又解中央觀音是等覺之住出位餘菩薩等覺之入位故同雖名觀音行位高下異故主伴義成也已上第四章畢經時薄伽梵一切三界主如來下第五章也分文為三初明能説主次第二明理趣義後第三明身口二密義也經復説一切如來至一切安樂者第二明理趣義也經時虛空藏下明第三身口二密義也就初明理趣義中為三謂第一總標經云復説一切至般若理趣者是也第二釋理趣義者經所謂以潅頂至一切安樂者是也次第三歎德也就標中潅頂智藏者是舉所説法宗要也謂十地因行滿足而欲登妙覺果時以大悲之智水注潅頂上而表萬行充潤衆人被摧潅頂戴相也以甘露寶瓶入智水而令宛潤世間資生具除一切有情之貧窮苦之標幟而顯示衆人所歸最上首義之標示相也是即潅頂義也於是潅頂智藏若約能通達人即名虛空藏菩薩也然亦約所通達法名潅頂智藏也就釋義中經云以潅頂施故能得三界法王位者是南方第一寶菩薩之瑜伽行法也經云義利施故得一切意願滿足者第二光菩薩瑜伽行法也經云以法施故得圓滿者是第三幢菩薩瑜伽行法也經云一切法資生施故得身口意一切安樂者第四笑菩薩瑜伽行法也若準本釋意云若修是瑜伽行法之行者要可修是觀想也我身即虛空藏菩薩也以金剛寶瓶潅頂於一切佛也是寶菩薩行法也以義利施而惠沙門婆羅門也謂以世間資生供具施有德行人云也以法施為不現形天龍八部等法而施與也資生施施與傍生之類也以是四行配南方四菩薩之行也本釋云中央畫虛空藏菩薩前畫寶菩薩右畫光菩薩左畫幢菩薩後畫笑內外院四隅各列內外四供養云云經時虛空藏大菩薩下第二明身口二密相也真言字義如常釋具辨已上第五章畢經時薄伽梵得一切如來下第六金剛舉菩薩章也又分三初明説主第二明理趣義後第三時薄伽梵為欲重下明身口二密相也是中金剛拳菩薩名為薄伽梵也得一切智印如來者是約果地得名也亦名不空成就佛是也就明理趣義中亦為三初總標經云復説一切至般若理趣者是也第二釋理趣義經云所謂持一切至最勝悉地者是也第三歎功能經云金剛手至正等菩提者是也就釋義中有四菩薩是即北方不空成就佛四親近菩薩也文持一切如來至一切如來身者是第一業菩薩三摩地行是菩薩之身密化用即得無礙無盡色身遍滿於無盡界以身業供養佛化度諸衆生類也從得此地以來離分段身而得意生身而自在如意遍在諸趣也文持一切如來至一切如來法者第二明護菩薩三摩地行也是菩薩以大慈悲甲胄而莊嚴自身普宣説佛正法而護持法界無量衆生恆常無有疲惓懈怠而説法教化人也是地菩薩以四無礙辨利益衆生也是護菩薩行也文持一切如來至三摩地者是牙菩薩三摩地行也是菩薩得等覺位金剛喻三昧能頓斷滅第八阿賴耶識所持煩惱所知二障種子將向妙覺果位也金剛瑜三昧即名心密也文持一切如來至最勝悉地者第四明拳菩薩三摩地行也是菩薩即是妙覺果地也是菩薩得前三人菩薩行聚集成就一體一味之三密具足金剛不壞妙果故云即成就一切如來身口意業最勝悉地也故本釋云廣瑜伽中身口意金剛合成名為拳一切如來縛是金剛拳云云私云是四菩薩如次當第八九十地及等覺更亦乃於佛果位有此拳菩薩也此義如六卷略出經四云從行者不闕法則至十六生畢定成佛云又解四菩薩如次配第八九十地等覺入位也中央更亦有拳菩薩配等覺中之住心位也如仁王儀軌云金剛波羅蜜多者此云到彼岸也依前法輪現勝妙身行願圓滿住等覺位也云經金剛手若有下第三歎功能也就此文中有二初明修行相經云若有聞此至作意思惟者是明修行相也後第二正明功報經云得一切自在至正覺菩提者是也文句云是中略有六種功德報一得自在二得一切智智三得事業成就四得金剛三業五得悉地六證菩提又解開事業與成就為二則成七種云云本釋云由持身即得一切成就此句梵本初功能漢本在第四由持語即得一切口自在由持心印得一切智智由持金剛印得一切事業皆悉成就疾證無上正等菩提云私云此文意即以以前三種功報即配前三種菩薩也以第四五功報而配第四菩薩也約第四菩薩更有二位也謂等覺與妙覺也故本釋云中央畫一切如來拳菩薩前畫業菩薩右畫護菩薩左畫牙菩薩後畫拳菩薩內外四隅各安內外四供養云云經時薄伽梵為欲重下第三身口二密法也已上第六章畢從第三降三世章至第六章金剛拳章并上四章是東西南北四方相對次第生起也經時薄伽梵一切無戲論如來下第七文殊師利菩薩章也文有三初明説主第二明理趣義第三明身口二密相也就明第一能説主一切無戲論如來者約法是八不中道義也約人即一切無戲論如來是文殊師利菩薩之佛果名號云也就第二明理趣義中有二初總標經云復説轉字輪般若理趣者是也第二釋理趣義經云所謂諸法至清淨故者是也從此已下六章略不説歎得也心真言者謂字也亦有等五字也是文殊五尊真言也又解字五轉也謂是也如次配五種三摩地法也故云轉字輪般若理趣也就釋理趣義中經云諸法空性與至相應故者是若約人明義者明第一金剛界佛部文殊三摩地行也經云諸法無相至相應故者第二明金剛部忿怒文殊三摩地行也經云諸法至相應故者第三蓮華部文殊三摩地行也經云諸法光明至清淨故者明第四寶部文殊三摩地行也若約法明義者空解脫門無相解脫門無願解脫門及離言絶相本覺真如理性智體有大智慧光明義是也上句諸法空者示所證理性也下句與無自性相應故示能證智體也理智冥合名空解脫門智也下三句解脫智義準之可知也此四句法不二智體總相合名第五文殊行也此章中別雖不説第五羯磨部之文殊自位分齊行法而説前四菩薩行位法中自然顯示羯磨部之文殊自證行法也若指此例者法華經明開示悟入四種字中雖不別説第五方便具足阿字而理實自爾具足第五方便具足字而是自然道理義也亦是爾也而此中四親近菩薩中隨一菩薩非當羯磨部文殊也凡前後諸章皆可有此意故也解脫者涅槃理也門者能緣智也然則文殊行法總亦當羯磨部也本釋云於中央畫文殊師利童子形四方安置四佛以虛空智劍各繫四佛臂上其內四隅置四種般若波羅蜜多外四隅安外四供養云云經時文殊師利下第三明身語二密相也就中經云以自劍揮斫一切如來者以文殊之八不中道之智劍而摧折一切在纒如來藏之佛臂意也問八不者何義耶答中觀論觀因緣品頌云不生亦不滅不常亦不斷不一亦不異不來亦不出能説是因緣善滅諸戲論云云吉藏疏云此論一部橫破八迷竪窮五句洗顛倒之病令畢竟無遺即是中實故云不生不滅乃至不常不斷也云云何故切斫佛臂者佛果豈非金剛身義耶答本釋云以四智菩提對於四種妄識既除則成就法智若不除妄執法則成法執病是故智增上菩薩用四種文殊師利般若波羅蜜劍斷四種成佛智能取所取障礙是故文殊師利現揮斫四佛臂也云云此中云斫一切如來臂者此如來是準下金剛藥叉章云是未成佛時有情尚云如來是即具足性德如來藏故也是亦爾也故下文云以金剛藥叉形持金剛牙恐怖一切如來者一切外道諸天悉具足如來藏是未來佛令捨邪歸正故名恐怖一切如來今所恐怖非在果位如來乃因佛也云云是亦爾也依三解脫門智是除斷四種染法之惑障也斷盡此惑障即依文殊之八不利智之劍揮斫力云也斫臂者摧破彼妄執取而成惑物之義也臂者手之所依根本處也手即有執持物用也執取義者是執持生死法即其所持二種生死果報業煩惱無明染法也是由執著我法之二執是臂義相當也從上第一第二章至第六金剛拳章者是因果相對次第生起也從第三降三世章者是東西南北四方相對次第生起也但第一金剛薩埵章第二毗盧遮那章是遍通諸諸方也但約果因次第明之也問第一金剛薩埵章是東方金剛部菩薩也而何有通遍八方十方義耶答以金剛薩埵一向為金剛部阿閦佛所屬四親近所攝之隨一菩薩時偏以此金剛薩埵為東方菩薩也今唯以金剛薩埵而為中臺尊而以十七尊為眷屬時此金剛薩埵遍諸方義有也故金剛頂經云普賢法身遍一切能為三界自在主云云又此經第十七章云復説最勝無初中後大金剛者此義也又釋名門中辨第一金剛薩埵即通五部義品是意也第二毗盧舍那佛通諸方義易知也又但毗盧舍那章次第三降三世章來因者初明正法輪身法畢故次明教令輪身法也正法輪所護法也教令身能護人也明自受用報身佛後次明變化等流身現起義也東西南三章之中東方且示變化身也西南二方佛是他受用法身義也又北方佛自受用法身也謂此等能變化佛是起從法身果地為利他故生變化等流身隨此變化等流身而令聽聞正法而稱地住而見他受用身若隨無量壽佛若寶生佛而聞其所説法還則究竟方今得證入法身果地大日位云也第一金剛薩埵章通五部第二毗盧舍那章佛部也是中四方四佛為四伴侶矣是中方也又降三世章是金剛部也觀自在章是蓮華部也虛空藏章是寶部也金剛拳章即羯磨部也如是有次第也問金剛部寶部蓮華部羯磨部常次第可列也然何金剛部次列蓮華部耶答準理趣釋可知之故其正文云佛寶者是金剛薩埵法寶者觀自在菩薩僧寶者是虛空藏菩薩云云準此義有是次第也但金剛拳章是顯一體三寶之所為事業或亦顯示一體三寶者正即是三密金剛境界云義也又從文殊章至降三世教令輪章者是亦羯磨部所攝也祕密八印品文殊名為法住義約説正法令止住世間之事業用者是一體三寶之所為事業也從第七文殊師利章至第十六四波羅蜜章者是但不依方角次第而皆悉同有四方周備義故也依第七文殊智行而成第八才發心轉法輪行也謂內無智德者何外轉法輪耶既智行備而輪正法輪故定必堪受衆人歸依供養行也所以次第九虛空庫章來也是即明內四供養菩薩即是供養正法輪身及供養行具足故必可有教令輪身之外護者成義也故虛空庫章次第十摧一切魔章之所持法也問摧一切魔章與上第三降三世章有何異耶答私云摧一切魔菩薩為護修行善人故用之降伏一切魔等也降三世菩薩為護教令故因之降伏一切魔等也是約所護是人與法既不同故是二尊別開説也於外護者亦有細有麁細者摧一切魔菩薩及忿怒降三世菩薩是也麁者外金剛部護法天等是也於是護法天有四類一者第十二章魔醯首羅等二十五種類諸天也二者第十三章七母天也三者摩度羯羅等第十四章四者第十五章四姊妹天是也其至于此第十二章中正明約人四智四波羅蜜佛菩薩之平等本覺佛性理者是即普通該攝涉通餘一切染汚法為理性而常住不變也是即示説一切有情心內皆悉具足佛性義故因之諸世天等聞是説即謂我等天等有成佛之性而即歡喜説本誓真言也又是第十章重説約法於是四部曼荼羅一一曼荼羅皆悉互相攝五部曼荼羅法義也前第十二章一往雖明佛界與有情界互融通義尚未説佛界衆生界中一一諸法悉皆全體融通相攝義今至千是第十六章重明四部曼荼羅各一一法互相攝四部曼荼羅其一一諸法而無礙無盡如帝網喻義也故上第十二章十三十四十五之四箇章次第十六章來也第十七金剛薩埵五祕密章重約人更抽明金剛薩埵與四親近菩薩瑜伽行法方為最要之行法義也既有於初後兩章正重説大樂金剛不空真實三摩耶般若理趣義而括攝中間十五章也應知中間十五章瑜伽行法皆方歸攝金剛薩埵瑜伽法而成佛果菩提義中又初後二章既以舉五部曼荼羅法故其中間十五章亦隨其所應可通攝五部曼荼羅法中云義耳復次第十六章次説第十七章所以者彼第十六章明四波羅蜜法中直説法佛內證境界五部之帝綱無礙究竟圓融相即攝入義也而所以成就顯得彼五部法究竟圓融相即攝入法者是依止修習此金剛薩埵五祕修行之因緣而成就此內證究竟圓融之果德法故彼第十六章次説此第十七章之修行法也復次為顯示第十六章中有自受法樂德及攝化利他德義故次至此第十七章而更明金剛薩埵自利利他殊勝二行法也時薄伽梵一切如來入大輪如來下第八才發心轉法輪章也就中有三初明能説主第二明所説理趣義第三明身口二密也就第二明理趣義中為三初總標大意經云復説入大輪下是也其法者謂無漏正法是即大圓鏡智平等性智妙觀察智成事智正法也輪是旋轉從自身回轉他身義也正宣傳此四智正法輪於他人云也又摧破義也謂以此四輪摧破四魔尚如輪王輪寶摧怨敵也第二明所説理趣義者經云所謂入金剛至一切事業輪者是也第三明身口二密者經云時才發心下是也就釋理趣義中明金剛部寶部蓮華部羯磨部四輪中各皆有才發心菩薩轉正輪之德行義也故文句云義中自有四句如次配四輪三摩地謂金剛輪忿怒輪蓮華輪羯磨輪也云云經云入金剛平等至如來法輪者第一明入金剛界大圓鏡智門六曼荼羅義也六曼荼羅義有指歸中經云入義平等至大菩薩輪者第二明入降三世尊之平等性智門十曼荼羅義也十曼荼羅義有指歸經云入一切法平等至妙法輪者第三明入蓮華部妙觀察智門六曼荼義也經云入一切業平等至事業輪者第四明入羯磨輪之成所作智門六曼荼羅中也可撿指歸謂以上四種法輪為利他而廣演流布之人名云才發心轉法輪菩薩之行也是則為自利利他故證入是四智輪瑜伽三摩地名云入大輪也問一切義成就輪是可寶部也而何此中即名羯磨部義耶答是有二義即通二部也謂一切義成就即是補處潅頂大士將登極位人也即當福德門義也兼又是人亦則尚於利他門成成所作智行而作利他事業故亦名羯磨部也故釋上文殊師利章理趣釋文云諸法光明般若波羅蜜多清淨故者一切義成就曼荼羅中寶利菩薩三摩地云云而是第八轉法輪章中本釋文云入一切業平等則入一切事業輪者則成人一切義成就云云本釋云應建立曼荼羅畫八輻輪形輪臍中畫金剛輪菩薩於八輻間畫八大菩薩如前布列八輻外四隅畫四波羅蜜菩薩內院四隅安四內供養外四隅安四外供養四門安四菩薩等云云是明第八章是曼荼羅法也經云時才發心轉法輪下第三明身口二密相也已上第八章畢經時薄伽梵一切如來種種供養下第九虛空庫章也文為三初明能説主經云一切如來種種供養藏廣大儀式如來是也是內四供養菩薩總名也第二明所説理趣中有二初總標經云復説一切供養下是也是總集四內供養行故立一切如來種種供養廣大儀式名也第二釋理趣義經云所謂發菩提至廣大供養者是也是約人即內四供養菩薩名也經發菩提心至廣大供養者四內供養中第一金剛嬉戲菩薩之菩提心行也是行即自利行之自受法樂義也謂發生大菩提心而受樂為大菩提心行之智惠波羅蜜多也是嬉戲菩薩所行法也經云救濟一切至廣大供養者第二金剛鬘菩薩三昧行也是行即利他施行也謂此菩薩自得自行福智莊嚴寶鬘而返為利他故以財施法隨緣而利益安樂衆生故名為鬘菩薩行也經云受持妙典至廣大供養者是第三金剛歌菩薩三昧行也是菩薩行即於佛正法之八萬法藏十二部經一切教理行果中能問答決釋此妙典甚深義之行名為歌菩薩行也經云於般若波羅蜜至廣大供養者是第四舞菩薩之行是也菩薩行是於般若等甚深大乘經典能成十行也一者受持二者讀三者誦四者自書五教他書六思惟七者修習八者供養行也若更加解脫説及請説行即為十法行也以此所説四種妙行則為廣大供養行云也何以是等四行為供養義者彼此四行之行者則令諸佛菩薩成歡喜資益利樂故以是四行為福智二種資糧而則顯得三身菩提果云也若作曼荼羅法者本釋云中央畫虛空庫菩薩月輪中八大菩薩圍繞內外四隅安八供養等云云經虛空庫大菩薩下第三明身語二密相也已上第九章畢經時薄伽梵能調持智拳下第十摧一切魔章也文有三初明能説主次所説理趣義後明身口二密相也能調持智拳如來者金剛藥叉之異名也是果位名也就第二明所説理趣中為三初總標經云復説一切調伏智藏者是中明五部忿怒尊降伏一切魔義故立是名也經云所謂一切至則為菩提者第二釋理趣義也就中經云一切有情至忿怒平等者是明能調持智拳如來所屬之第一金剛部降三世三摩地行也意云於一切有情平等有佛性如來藏理故則巧方便為令顯此理故強於大慈悲心而假示現其忿怒三摩地相而降伏成障礙人而欲令顯得此佛性理故降伏欲界第六他化自在天魔王之夫婦而令引入佛道云也經云一切有情至忿怒調伏者明第二寶部中忿怒軍荼利尊三摩地行也調伏第四禪摩醯首羅天王而令引入佛道也是亦以大慈悲心為調伏大魔王而示現忿怒相也經云一切有情至忿怒法性者明第三蓮華部馬頭忿怒觀音三摩地行也降伏梵王令引入佛道義也是當初禪主也經云一切有情至忿怒金剛性者明第四金剛藥叉菩薩羯磨部三摩地行也降伏欲界頂魔波旬天王而令引入佛道義也一切有情金剛性故忿怒金剛性者謂以所化一切有情本有自性住佛性之本覺智惠即不壞堅實義故即能令顯得如是智堅固不壞性云也此第五句當不動明王之總通調伏一切魔軍等義也已上明教令輪義也經何以故至則為菩提者遂顯示歸攝第五正法輪身義也謂上所説四忿怒智是實成事智門中慈氏菩薩之所為事業也佛德中發從本無忿怒嗔恚惡心故也但為利他故內以猛利之智用為斷除諸自他惑染而假外示現忿怒可畏形而令怖畏惡人則引入佛正法中云也是皆佛果之四無量心中大慈大悲行云也故本釋云何以故一切有情調伏即為菩提者本是慈氏菩薩由此菩薩內入慈定深矜愍難調諸天外示威猛令得受化引入菩提云云經云摧一切魔大菩薩下第三明身口二密相也經云以金剛界藥叉形持金剛牙恐怖一切如來者本釋云一切外道諸天悉具如來藏是未來佛令捨邪歸正故名恐怖一切如來如來者離五怖得四無所畏無能怖者也今所恐怖非在果位如來乃在因佛也云云曼荼羅建立相可撿本釋正文也以字為心真言意者謂以斷為分段變易二種生死之因緣之妄執而為因由即所顯成入我我入本不生之智門是也乃以觀本有菩提心種子與菩提涅槃果為因緣義門而為所觀法是也為金剛藥叉菩薩之所守護三摩地所行法也已上第十章畢大樂經顯義抄卷中
